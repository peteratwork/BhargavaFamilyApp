workflows:
  ios-simulator-build:
    name: iOS simulator build
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      xcode: latest
    scripts:
      - name: Build for iOS Simulator
        script: |
          xcodebuild \
            -project BhargavaFamilyApp.xcodeproj \
            -scheme BhargavaFamilyApp \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
    artifacts:
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/Products/Debug-iphonesimulator/*.app

  ios-release-archive:
    name: iOS release archive
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: bhargava-family-appstore
    environment:
      xcode: latest
      vars:
        BUNDLE_ID: com.bhargava.familyapp
      ios_signing:
        provisioning_profiles:
          - bhargava_app_store_profile
        certificates:
          - bhargava_distribution
    scripts:
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles --archive-method=app-store
      - name: Build signed IPA for distribution
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/BhargavaFamilyApp.xcodeproj" \
            --scheme "BhargavaFamilyApp"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false
