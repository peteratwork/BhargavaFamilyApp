workflows:
  ios-simulator-build:
    name: iOS simulator build
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      xcode: latest
    scripts:
      - name: Test app core
        script: swift test --package-path Packages/BhargavaCore
      - name: Build for iOS Simulator
        script: |
          xcodebuild \
            -project BhargavaFamilyApp.xcodeproj \
            -scheme BhargavaFamilyApp \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
    artifacts:
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/Products/Debug-iphonesimulator/*.app

  ios-release-archive:
    name: iOS release archive
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: bhargava-family-appstore
    environment:
      groups:
        - supabase_production
      xcode: latest
      vars:
        BUNDLE_ID: com.bhargava.familyapp
      ios_signing:
        provisioning_profiles:
          - bhargava_app_store_profile
        certificates:
          - bhargava_distribution
    scripts:
      - name: Validate release configuration
        script: |
          set -euo pipefail
          python3 <<'PY'
          import os
          from urllib.parse import urlparse

          url = os.environ.get("SUPABASE_URL", "")
          key = os.environ.get("SUPABASE_PUBLISHABLE_KEY", "")
          parsed = urlparse(url)

          if parsed.scheme != "https" or not parsed.hostname:
              raise SystemExit("SUPABASE_URL must be a valid HTTPS URL")
          if not key or key == "replace-me" or "$(" in key:
              raise SystemExit("SUPABASE_PUBLISHABLE_KEY is missing or unresolved")
          if key.lower().startswith("sb_secret_"):
              raise SystemExit("A Supabase secret key must never be embedded in the iOS app")
          try:
              import base64, json
              parts = key.split(".")
              payload = parts[1] + "=" * (-len(parts[1]) % 4)
              claims = json.loads(base64.urlsafe_b64decode(payload)) if len(parts) == 3 else {}
          except Exception:
              claims = {}
          if claims.get("role") == "service_role":
              raise SystemExit("A legacy service-role JWT must never be embedded in the iOS app")
          PY
      - name: Test app core
        script: swift test --package-path Packages/BhargavaCore
      - name: Set unique build number
        script: agvtool new-version -all "$BUILD_NUMBER"
      - name: Generate App Store app icons
        script: |
          python3 <<'PY'
          import json, os, struct, zlib

          icon_dir = "BhargavaFamilyApp/Assets.xcassets/AppIcon.appiconset"
          os.makedirs(icon_dir, exist_ok=True)

          entries = [
              ("iphone", "20x20", "2x", 40), ("iphone", "20x20", "3x", 60),
              ("iphone", "29x29", "2x", 58), ("iphone", "29x29", "3x", 87),
              ("iphone", "40x40", "2x", 80), ("iphone", "40x40", "3x", 120),
              ("iphone", "60x60", "2x", 120), ("iphone", "60x60", "3x", 180),
              ("ipad", "20x20", "1x", 20), ("ipad", "20x20", "2x", 40),
              ("ipad", "29x29", "1x", 29), ("ipad", "29x29", "2x", 58),
              ("ipad", "40x40", "1x", 40), ("ipad", "40x40", "2x", 80),
              ("ipad", "76x76", "1x", 76), ("ipad", "76x76", "2x", 152),
              ("ipad", "83.5x83.5", "2x", 167),
              ("ios-marketing", "1024x1024", "1x", 1024),
          ]

          def chunk(kind, data):
              return struct.pack(">I", len(data)) + kind + data + struct.pack(">I", zlib.crc32(kind + data) & 0xffffffff)

          def write_png(path, size):
              rows = []
              for y in range(size):
                  row = bytearray([0])
                  for x in range(size):
                      t = (x + y) / max(1, size * 2)
                      r = int(48 + 78 * t)
                      g = int(72 + 95 * (1 - t))
                      b = int(150 + 70 * t)
                      cx = abs(x - size / 2) / (size / 2)
                      cy = abs(y - size / 2) / (size / 2)
                      if cx < 0.35 and cy < 0.35:
                          r, g, b = 245, 247, 255
                      row.extend([r, g, b])
                  rows.append(bytes(row))
              raw = b"".join(rows)
              png = b"\x89PNG\r\n\x1a\n"
              png += chunk(b"IHDR", struct.pack(">IIBBBBB", size, size, 8, 2, 0, 0, 0))
              png += chunk(b"IDAT", zlib.compress(raw, 9))
              png += chunk(b"IEND", b"")
              with open(path, "wb") as f:
                  f.write(png)

          images = []
          for idiom, logical_size, scale, pixels in entries:
              filename = f"Icon-{idiom}-{logical_size.replace('.', '_')}@{scale}.png"
              write_png(os.path.join(icon_dir, filename), pixels)
              images.append({
                  "idiom": idiom,
                  "size": logical_size,
                  "scale": scale,
                  "filename": filename
              })

          with open(os.path.join(icon_dir, "Contents.json"), "w", encoding="utf-8") as f:
              json.dump({"images": images, "info": {"author": "xcode", "version": 1}}, f, indent=2)
          PY
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles --archive-method=app-store
      - name: Build signed IPA for distribution
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/BhargavaFamilyApp.xcodeproj" \
            --scheme "BhargavaFamilyApp" \
            --archive-xcargs "SUPABASE_URL=$SUPABASE_URL SUPABASE_PUBLISHABLE_KEY=$SUPABASE_PUBLISHABLE_KEY"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
