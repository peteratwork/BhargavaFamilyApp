name: Backend Tests

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  supabase:
    name: Supabase database and functions
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install backend tools
        run: npm ci

      - name: Start local Supabase
        run: >-
          npx supabase start
          --exclude edge-runtime,imgproxy,logflare,postgres-meta,realtime,storage-api,studio,supavisor,vector

      - name: Rebuild database from migrations
        run: npx supabase db reset

      - name: Lint database
        run: npx supabase db lint --local --level warning

      - name: Test database policies and functions
        run: npx supabase test db

      - name: Test Edge Functions
        if: ${{ hashFiles('supabase/functions/tests/**/*.ts') != '' }}
        run: npm run functions:test

      - name: Stop local Supabase
        if: always()
        run: npx supabase stop --no-backup
